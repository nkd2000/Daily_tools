<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Rounded Square (Squircle) matching your UI -->
  <rect width="512" height="512" rx="128" fill="url(#gradient)"/>
  
  <!-- Modern Lightning Bolt (Representing Speed/Utility) -->
  <path d="M290 80L130 300H240L210 440L370 220H260L290 80Z" fill="white" filter="url(#shadow)"/>
  
  <!-- Accents: Small dots representing "Tools/Grid" -->
  <circle cx="400" cy="112" r="20" fill="white" fill-opacity="0.4"/>
  <circle cx="350" cy="112" r="15" fill="white" fill-opacity="0.2"/>

  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5"/> <!-- Indigo 600 -->
      <stop offset="1" stop-color="#7C3AED"/> <!-- Purple 600 -->
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="512" height="512" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.2"/>
    </filter>
  </defs>
</svg>